name: Build C2 Server Client & Packer

on:
    push:
        branches: [main]
        paths:
            - "xor-c2-server/**"
            - "xor-c2-client/**"
            - "agents/linux/**"
            - "packer/**"
            - ".github/workflows/build-c2.yml"
    pull_request:
        branches: [main]
        paths:
            - "xor-c2-server/**"
            - "xor-c2-client/**"
            - "agents/linux/**"
            - "packer/**"
            - ".github/workflows/build-c2.yml"
    workflow_dispatch:

jobs:
    build-server:
        name: Build C2 Server
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      xor-c2-server/target
                  key: server-${{ runner.os }}-${{ hashFiles('xor-c2-server/Cargo.lock') }}

            - name: Build server
              working-directory: xor-c2-server
              run: cargo build --release

            - name: Upload server artifact
              uses: actions/upload-artifact@v4
              with:
                  name: xor-c2-server
                  path: xor-c2-server/target/release/xor-c2-server

    build-client:
        name: Build C2 Client
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install egui dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
                      libxkbcommon-dev libssl-dev libgtk-3-dev

            - name: Cache Cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      xor-c2-client/target
                  key: client-${{ runner.os }}-${{ hashFiles('xor-c2-client/Cargo.lock') }}

            - name: Build client
              working-directory: xor-c2-client
              run: cargo build --release

            - name: Upload client artifact
              uses: actions/upload-artifact@v4
              with:
                  name: xor-c2-client
                  path: xor-c2-client/target/release/xor-c2-client

    build-packer:
        name: Build Packer
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable + Windows target
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-gnu

            - name: Install mingw-w64
              run: |
                  sudo apt-get update
                  sudo apt-get install -y mingw-w64

            - name: Cache Cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      packer/target
                  key: packer-${{ runner.os }}-${{ hashFiles('packer/Cargo.lock') }}

            - name: Build packer CLI
              working-directory: packer
              run: cargo build --release -p packer-cli

            - name: Build stub (Windows)
              working-directory: packer
              run: cargo build --release --target x86_64-pc-windows-gnu -p stub

            - name: Upload packer artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: packer
                  path: |
                      packer/target/release/packer
                      packer/target/x86_64-pc-windows-gnu/release/stub.exe
